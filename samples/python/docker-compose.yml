services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo done"]
      interval: 10s
      timeout: 5s
      retries: 20
  
  mcp-server:
    build: .
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      PORT: "3000"
      PUBLIC_URL: "http://localhost:3000"
      RESOURCE: "http://localhost:3000/mcp"
      AUTH_MODE: "${AUTH_MODE:-oauth}"
      OIDC_ISSUER: "http://localhost:8080/realms/mcp-demo"
      CLIENT_ID: "mcp-server"
      CLIENT_SECRET: "mcp-server-secret-change-me"
      DOWNSTREAM_STRATEGY: "token-exchange"
      DOWNSTREAM_AUDIENCE: "downstream-api"
      DOWNSTREAM_BASE_URL: "https://downstream.example.com"
      DOWNSTREAM_PAT: "${DOWNSTREAM_PAT:-}"
    ports:
      - "3000:3000"
    extra_hosts:
      - "localhost:host-gateway"
